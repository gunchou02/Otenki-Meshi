<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>お天気メシ - グルメ予報</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      /* === ベーススタイル (Base Styles) === */
      body {
        font-family: "Noto Sans JP", sans-serif;
        background-color: #eef2f6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        /* モバイル端末ではパディングを削除 */
      }

      @media (max-width: 859px) {
        body {
          padding: 0;
          align-items: flex-start; /* 上部詰めで配置 */
          background-color: #fff; /* モバイル版は視認性を高めるため背景を白に設定 */
        }
      }

      .font-logo {
        font-family: "Zen Kaku Gothic New", sans-serif;
        font-weight: 900;
        letter-spacing: 0.02em;
      }

      /* === アプリケーションコンテナ (App Container) === */
      .app-container {
        width: 100%;
        max-width: 1080px;
        background-color: #ffffff;
        height: 90vh;
        max-height: 900px;
        min-height: 600px;
        box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.1);
        border-radius: 2.5rem;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* PCレイアウト (Desktop Layout) */
      @media (min-width: 860px) {
        .app-container {
          flex-direction: row;
        }
        .hero-section {
          width: 42%;
          flex-shrink: 0;
          height: 100%;
        }
        .content-section {
          width: 58%;
          height: 100%;
          overflow-y: auto;
          scrollbar-width: thin;
          scrollbar-color: #cbd5e1 transparent;
        }
      }

      /* モバイルレイアウト修正 (Mobile Optimization) */
      @media (max-width: 859px) {
        .app-container {
          height: auto;
          min-height: 100vh; /* 画面全体を使用 */
          max-height: none;
          border-radius: 0; /* 角丸設定を解除 */
          box-shadow: none;
          overflow: visible;
        }
        .content-section {
          overflow-y: visible;
          padding: 2rem 1.5rem; /* 左右の余白を調整 */
          min-height: 60vh; /* コンテンツ領域の最小高さを確保 */
          background-color: #fff; /* 背景色を統一 */
          border-radius: 2rem 2rem 0 0; /* 上部のみ角丸に設定 */
          margin-top: -2rem; /* ヘッダーとの一体感を出すためマージンを調整 */
          position: relative;
          z-index: 20;
        }
        .hero-section {
          padding: 3rem 1.5rem 5rem 1.5rem; /* コンテンツの重なりを考慮し、下部パディングを拡張 */
        }
      }

      /* === 左側：ヒーローセクション (Hero Section) === */
      .hero-bg {
        background: linear-gradient(145deg, #3b82f6 0%, #4f46e5 100%);
        position: relative;
        overflow: hidden;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 4rem 3rem;
      }

      /* パーティクルアニメーション */
      .particle {
        position: absolute;
        opacity: 0.15;
        animation: float-particle 8s infinite linear;
      }
      .p1 {
        top: 10%;
        left: 10%;
        animation-duration: 10s;
        font-size: 2rem;
      }
      .p2 {
        top: 20%;
        right: 20%;
        animation-duration: 12s;
        animation-delay: -2s;
        font-size: 1.5rem;
      }
      .p3 {
        bottom: 30%;
        left: 15%;
        animation-duration: 9s;
        animation-delay: -4s;
        font-size: 2.5rem;
      }
      .p4 {
        bottom: 10%;
        right: 10%;
        animation-duration: 11s;
        animation-delay: -1s;
        font-size: 2rem;
      }

      @keyframes float-particle {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0.1;
        }
        50% {
          transform: translateY(-20px) rotate(180deg);
          opacity: 0.2;
        }
        100% {
          transform: translateY(0) rotate(360deg);
          opacity: 0.1;
        }
      }

      /* メインアイコン浮遊アニメーション */
      .main-float-icon {
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
        animation: float-main 4s ease-in-out infinite;
      }
      @keyframes float-main {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }

      /* === 右側：コンテンツセクション (Content Section) === */
      .content-section {
        background-color: #f8fafc;
        padding: 2.5rem 3rem;
      }

      .welcome-graphic {
        position: relative;
        width: 280px;
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* モバイル用グラフィックサイズ調整 */
      @media (max-width: 480px) {
        .welcome-graphic {
          width: 220px;
          height: 220px;
          margin-bottom: 1rem;
        }
        .floating-card {
          font-size: 0.65rem;
          padding: 0.5rem 0.75rem;
        }
      }

      .floating-card {
        position: absolute;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        padding: 0.75rem 1rem;
        border-radius: 1rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        font-size: 0.75rem;
        font-weight: bold;
        color: #4b5563;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        animation: float-card 5s ease-in-out infinite;
      }
      .fc1 {
        top: 10%;
        left: -10%;
        animation-delay: 0s;
      }
      .fc2 {
        bottom: 20%;
        right: -5%;
        animation-delay: -1.5s;
      }
      .fc3 {
        top: 50%;
        right: -15%;
        animation-delay: -3s;
      }

      @keyframes float-card {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .btn-primary {
        background: linear-gradient(to right, #1f2937, #374151);
        color: white;
        border-radius: 1rem;
        box-shadow: 0 10px 25px -5px rgba(31, 41, 55, 0.3);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: relative;
        overflow: hidden;
      }
      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px -5px rgba(31, 41, 55, 0.4);
      }
      .btn-primary:active {
        transform: scale(0.98); /* モバイル操作時のタッチフィードバックを追加 */
      }
      .btn-primary::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: 0.5s;
      }
      .btn-primary:hover::after {
        left: 100%;
      }

      .loader {
        border-top-color: #3b82f6;
        animation: spinner 0.8s linear infinite;
      }
      @keyframes spinner {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .slide-up {
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(30px);
      }
      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .content-section::-webkit-scrollbar {
        width: 5px;
      }
      .content-section::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 3px;
      }

      .history-item {
        transition: all 0.2s;
      }
      .history-item:hover {
        background-color: #eff6ff;
        border-color: #bfdbfe;
        transform: translateX(3px);
      }
    </style>
  </head>
  <body>

          <h2

    <script>
      /**
       * お天気メシ - フロントエンドロジック
       * 作成者: Park Jeongbin
       * 技術スタック: HTML5, Tailwind CSS, Vanilla JS
       */

      // APIエンドポイント設定
      const API_URL =
        "https://4d48o52v1l.execute-api.ap-northeast-1.amazonaws.com/recommend";

      // アプリ初期化処理 (DOMContentLoaded)
      document.addEventListener("DOMContentLoaded", () => {
        renderHistory();
      });

      // アプリの状態をリセットする関数
      function resetApp() {
        document.getElementById("result").classList.add("hidden");
        document.getElementById("loader").classList.add("hidden");
        document.getElementById("placeholder").classList.remove("hidden");
        document.getElementById("locationNameDisplay").innerText =
          "現在地を取得中...";
        renderHistory();
      }

      /**
       * メイン処理: 現在地または選択した都市で検索を実行
       */
      function getRecommendation() {
        const loader = document.getElementById("loader");
        const placeholder = document.getElementById("placeholder");
        const locationSelect = document.getElementById("locationSelect"); // 場所選択ドロップダウン要素の取得
        const selectedValue = locationSelect.value; // 選択された値（座標または識別子）の取得

        // UIをローディング表示に切り替え
        placeholder.classList.add("hidden");
        loader.classList.remove("hidden");

        // [Case A] 「現在地 (GPS)」が選択された場合 -> ブラウザのGeolocation APIを使用
        if (selectedValue === "current") {
          if (!navigator.geolocation) {
            alert(
              "お使いのブラウザは位置情報をサポートしていません。\nChromeやSafariなどの最新ブラウザをご利用ください。",
            );
            resetApp();
            return;
          }

          navigator.geolocation.getCurrentPosition(
            async (position) => {
              const lat = position.coords.latitude;
              const lon = position.coords.longitude;

              // 逆ジオコーディングとAPIデータ取得を実行
              fetchLocationName(lat, lon);
              await fetchData(lat, lon);
            },
            (error) => {
              console.error("Geolocation Error:", error);
              alert("位置情報の取得に失敗しました。");
              resetApp();
            },
            { timeout: 10000 },
          );
        }

        // [Case B] 「デモ用地域」が選択された場合 -> プリセット座標を使用
        else {
          const [lat, lon] = selectedValue.split(","); // 文字列 "lat,lon" を分割して配列化

          // 処理中であることをユーザーに伝えるため、意図的に僅かな遅延を追加 (UX向上)
          setTimeout(async () => {
            fetchLocationName(lat, lon); // 地名(住所)の取得
            await fetchData(lat, lon); // 天気およびグルメデータの取得
          }, 500);
        }
      }

      /**
       * バックエンドAPIとの通信処理
       * サーバーレスAPI (AWS Lambda) を呼び出す
       */
      async function fetchData(lat, lon) {
        try {
          const params = new URLSearchParams({
            lat,
            lon,
            recent: getRecentKeywords().join(","),
            recent_shops: getRecentShopIds().join(","),
          });
          const response = await fetch(`${API_URL}?${params.toString()}`);

          // HTTPステータスコードのチェック
          if (!response.ok) {
            throw new Error(`Server Error: ${response.status}`);
          }

          const data = await response.json();

          // 正常系: 履歴保存と画面描画
          saveToHistory(data);
          displayResult(data);
        } catch (error) {
          // 異常系: エラーログ出力とユーザー通知
          console.error("API Fetch Error:", error);
          alert(
            "サーバーとの通信に失敗しました。\nしばらく時間を置いてから再度お試しください。☔️",
          );
          resetApp();
        }
      }

      /**
       * 逆ジオコーディング (座標 -> 住所変換)
       * OpenStreetMap (Nominatim API) を使用
       */
      async function fetchLocationName(lat, lon) {
        const displayEl = document.getElementById("locationNameDisplay");
        try {
          const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=14&accept-language=ja`,
          );
          if (!response.ok) throw new Error("Nominatim API error");

          const data = await response.json();

          let locationText = "現在地";
          if (data.address) {
            const addr = data.address;
            const province = addr.province || addr.state || "";
            const city = addr.city || addr.ward || addr.town || "";
            const suburb =
              addr.suburb || addr.quarter || addr.neighbourhood || "";
            const fullAddress = `${province} ${city} ${suburb}`.trim();
            if (fullAddress) locationText = fullAddress;
          }
          displayEl.innerText = locationText;
        } catch (e) {
          console.warn("Address fetch failed:", e);
          displayEl.innerText = "現在地 (住所取得不可)";
        }
      }

      // 履歴保存 (LocalStorageを使用)
      function saveToHistory(data) {
        const historyItem = {
          id: Date.now(),
          date: new Date().toLocaleDateString("ja-JP", {
            month: "short",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          }),
          weather: data.weather,
          temp: Math.round(data.temp),
          keyword: data.keyword,
          message: data.message,
          reason: data.reason,
          shops: data.shops,
        };

        let history = JSON.parse(
          localStorage.getItem("otenki_history") || "[]",
        );
        history.unshift(historyItem);
        if (history.length > 5) history = history.slice(0, 5); // 最新5件のみ保持
        localStorage.setItem("otenki_history", JSON.stringify(history));
      }

      // 履歴のレンダリング
      function renderHistory() {
        const history = JSON.parse(
          localStorage.getItem("otenki_history") || "[]",
        );
        const historySection = document.getElementById("historySection");
        const historyList = document.getElementById("historyList");

        if (history.length === 0) {
          historySection.classList.add("hidden");
          return;
        }

        historyList.innerHTML = "";
        history.forEach((item) => {
          const firstShop =
            item.shops && item.shops.length > 0
              ? item.shops[0].name
              : "おすすめ店";
          const weatherIcon = getWeatherIcon(item.weather);
          const div = document.createElement("div");

          div.className =
            "history-item bg-white p-3 rounded-xl border border-gray-100 flex justify-between items-center cursor-pointer";
          div.onclick = () => {
            document.getElementById("placeholder").classList.add("hidden");
            document.getElementById("result").classList.remove("hidden");
            displayResult(item);
          };

          div.innerHTML = `
              <div class="flex items-center gap-3 overflow-hidden">
                  <div class="w-10 h-10 shrink-0 rounded-full bg-blue-50 flex items-center justify-center text-lg shadow-sm">${weatherIcon}</div>
                  <div class="min-w-0 flex-1">
                      <div class="flex items-center gap-2 mb-0.5">
                        <p class="text-sm font-bold text-gray-800 truncate">${escapeHtml(item.keyword)}</p>
                        <span class="text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded font-medium">${item.temp}°C</span>
                      </div>
                      <p class="text-xs text-gray-500 truncate"><i class="fa-solid fa-store mr-1 text-gray-300"></i>${escapeHtml(firstShop)}...</p>
                      <p class="text-[10px] text-gray-300 mt-0.5">${item.date}</p>
                  </div>
              </div>
              <i class="fa-solid fa-chevron-right text-gray-300 text-xs shrink-0 pl-2"></i>
          `;
          historyList.appendChild(div);
        });
        historySection.classList.remove("hidden");
      }

      // 天気に応じたアイコンを返すヘルパー関数
      function getWeatherIcon(weather) {
        const map = {
          Clear: "☀️",
          Clouds: "☁️",
          Rain: "☔",
          Snow: "☃️",
          Thunderstorm: "⚡",
          Drizzle: "💧",
          Mist: "🌫️",
        };
        return map[weather] || "🌤️";
      }

      function getRecentKeywords() {
        try {
          const history = JSON.parse(
            localStorage.getItem("otenki_history") || "[]",
          );
          return [
            ...new Set(
              history
                .map((item) => item.keyword)
                .filter((keyword) => typeof keyword === "string" && keyword),
            ),
          ].slice(0, 5);
        } catch (error) {
          console.warn("History parse failed:", error);
          return [];
        }
      }

      function getRecentShopIds() {
        try {
          const history = JSON.parse(
            localStorage.getItem("otenki_history") || "[]",
          );
          return [
            ...new Set(
              history
                .flatMap((item) => item.shops || [])
                .map((shop) => shop.id)
                .filter((id) => typeof id === "string" && id),
            ),
          ].slice(0, 30);
        } catch (error) {
          console.warn("Shop history parse failed:", error);
          return [];
        }
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(
          /[&<>"']/g,
          (char) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[char],
        );
      }

      function safeExternalUrl(value) {
        try {
          const url = new URL(value);
          if (url.protocol === "https:" || url.protocol === "http:") {
            return url.href;
          }
        } catch (error) {
          console.warn("Invalid external URL:", error);
        }
        return "#";
      }

      // 結果画面の描画処理
      function displayResult(data) {
        const loader = document.getElementById("loader");
        const result = document.getElementById("result");
        const shopList = document.getElementById("shopList");

        loader.classList.add("hidden");

        // 天気情報の表示設定
        const weatherInfo = {
          Clear: {
            text: "晴れ",
            icon: "fa-sun",
            color: "text-orange-500",
            bg: "bg-orange-50",
          },
          Clouds: {
            text: "曇り",
            icon: "fa-cloud",
            color: "text-gray-500",
            bg: "bg-gray-50",
          },
          Rain: {
            text: "雨",
            icon: "fa-cloud-showers-heavy",
            color: "text-blue-500",
            bg: "bg-blue-50",
          },
          Snow: {
            text: "雪",
            icon: "fa-snowflake",
            color: "text-cyan-400",
            bg: "bg-cyan-50",
          },
          Thunderstorm: {
            text: "雷雨",
            icon: "fa-bolt",
            color: "text-purple-500",
            bg: "bg-purple-50",
          },
          Drizzle: {
            text: "霧雨",
            icon: "fa-cloud-rain",
            color: "text-blue-400",
            bg: "bg-blue-50",
          },
          Mist: {
            text: "霧",
            icon: "fa-smog",
            color: "text-gray-400",
            bg: "bg-gray-50",
          },
        };
        const info = weatherInfo[data.weather] || {
          text: data.weather,
          icon: "fa-cloud",
          color: "text-blue-500",
          bg: "bg-blue-50",
        };

        // DOM要素への反映
        document.getElementById("tempDisplay").innerText =
          `${data.temp ? Math.round(data.temp) : "--"}°`;
        document.getElementById("weatherTextDisplay").innerText = info.text;

        const iconEl = document.getElementById("weatherIconDisplay");
        iconEl.className = `fa-solid ${info.icon} ${info.color}`;
        document.getElementById("weatherIconBg").className =
          `w-16 h-16 rounded-2xl flex items-center justify-center text-4xl shadow-sm ${info.bg}`;
        document.getElementById("weatherMessage").innerText = data.reason
          ? `${data.message}\n${data.reason}`
          : data.message;

        // 店舗リスト生成
        shopList.innerHTML = "";
        if (data.shops) {
          data.shops.forEach((shop, index) => {
            const delay = index * 100;
            const shopName = escapeHtml(shop.name);
            const shopPhoto = safeExternalUrl(shop.photo?.pc?.s);
            const shopUrl = safeExternalUrl(shop.urls?.pc);
            const genreName = escapeHtml(shop.genre?.name || "グルメ");
            const shopCatch = escapeHtml(shop.catch || "");
            const budgetName = escapeHtml(shop.budget?.name || "予算情報なし");
            // Google Maps 検索用URL生成
            const query = encodeURIComponent(
              shop.name + " " + (shop.address || ""),
            );
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${query}`;

            const card = `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 slide-up cursor-pointer hover:border-blue-300 hover:shadow-md transition-all group" style="animation-delay: ${delay}ms;">
                  <a href="${escapeHtml(shopUrl)}" target="_blank" rel="noopener" class="flex gap-5 mb-4">
                    <div class="relative w-24 h-24 shrink-0">
                      <img src="${escapeHtml(shopPhoto)}" alt="${shopName}" class="w-full h-full rounded-2xl object-cover bg-gray-100 shadow-sm">
                    </div>
                    <div class="flex-1 min-w-0 flex flex-col justify-center py-1">
                      <h3 class="font-bold text-gray-900 text-base truncate mb-1.5 group-hover:text-blue-600 transition-colors">${shopName}</h3>
                      <div class="flex flex-wrap items-center text-xs text-gray-500 mb-3 gap-2">
                        <span class="bg-gray-100 px-2.5 py-1 rounded-lg text-gray-600 font-bold truncate">${genreName}</span>
                        <span class="truncate text-gray-400 pl-1">${shopCatch}</span>
                      </div>
                      <div class="flex items-center gap-2">
                        <div class="text-xs font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full flex items-center">
                            <i class="fa-solid fa-yen-sign mr-1 text-[10px]"></i>${budgetName}
                        </div>
                      </div>
                    </div>
                  </a>
                  <a href="${mapUrl}" target="_blank" rel="noopener" class="flex items-center justify-center w-full py-3 bg-[#f8fafc] text-gray-600 text-sm font-bold rounded-2xl hover:bg-blue-600 hover:text-white transition-all gap-2">
                    <i class="fa-solid fa-location-arrow"></i> ルート案内を見る
                  </a>
                </div>
              `;
            shopList.innerHTML += card;
          });
        }

        // 画面表示切り替え
        result.classList.remove("hidden");
        // モバイルでは結果位置までスクロール
        if (window.innerWidth < 768) {
          result.scrollIntoView({ behavior: "smooth" });
        }
      }
    </script>
  </body>
</html>
